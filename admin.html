<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — wangamenkomputer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b; --bg2: #111114; --bg3: #18181c;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --accent: #00e5a0; --accent2: #00b87a;
    --text: #e8e8ec; --muted: #888890;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    --danger: #ff6b6b;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 2.5rem; width: 100%; max-width: 520px; }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); margin-bottom: 0.5rem; }
  .logo span { color: var(--muted); }
  h2 { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; color: var(--text); }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  input, textarea, select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 14px; padding: 10px 12px; outline: none; transition: border 0.2s; width: 100%; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }
  textarea { resize: vertical; min-height: 80px; }
  .star-row { display: flex; gap: 8px; margin-top: 4px; }
  .star-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-size: 18px; width: 40px; height: 40px; cursor: pointer; transition: all 0.15s; }
  .star-btn.active { border-color: var(--accent); color: var(--accent); }
  .btn { font-family: var(--mono); font-size: 13px; font-weight: 700; background: var(--accent); color: #000; border: none; border-radius: 4px; padding: 12px 28px; cursor: pointer; width: 100%; margin-top: 0.5rem; transition: all 0.2s; }
  .btn:hover { background: var(--accent2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 0.5rem; }
  .btn-danger:hover { background: rgba(255,107,107,0.1); }
  .msg { border-radius: 6px; padding: 0.75rem 1rem; font-size: 13px; margin-top: 1rem; display: none; }
  .msg.success { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.3); color: var(--accent); }
  .msg.error { background: rgba(220,50,50,0.08); border: 1px solid rgba(220,50,50,0.3); color: var(--danger); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  .testi-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .testi-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .testi-item-info .name { font-family: var(--mono); font-size: 12px; color: var(--text); margin-bottom: 2px; }
  .testi-item-info .teks { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .testi-item-info .stars { font-size: 11px; color: var(--accent); }
  .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 4px; flex-shrink: 0; opacity: 0.6; transition: opacity 0.2s; }
  .del-btn:hover { opacity: 1; }
  #loginSection, #adminSection { width: 100%; }
  #adminSection { display: none; }
  .back-link { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: inline-block; margin-top: 1.5rem; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginSection" class="card">
  <div class="logo">wangamen<span>komputer</span></div>
  <h2>// admin panel</h2>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="passInput" placeholder="Masukkan password admin" onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <button class="btn" onclick="doLogin()">Masuk →</button>
  <div class="msg error" id="loginErr">Password salah.</div>
</div>

<!-- ADMIN -->
<div id="adminSection" class="card">
  <div class="logo">wangamen<span>komputer</span></div>
  <h2>// tambah testimoni</h2>

  <div class="form-group">
    <label>Nama Customer</label>
    <input type="text" id="aNama" placeholder="Nama lengkap atau panggilan">
  </div>
  <div class="form-group">
    <label>Username Instagram (opsional)</label>
    <input type="text" id="aIg" placeholder="@username (tanpa @)">
  </div>
  <div class="form-group">
    <label>Isi Testimoni</label>
    <textarea id="aTeks" placeholder="Tulis ulasan dari customer..."></textarea>
  </div>
  <div class="form-group">
    <label>Rating Bintang</label>
    <div class="star-row" id="starRow">
      <button class="star-btn" onclick="setBintang(1)">★</button>
      <button class="star-btn" onclick="setBintang(2)">★</button>
      <button class="star-btn" onclick="setBintang(3)">★</button>
      <button class="star-btn" onclick="setBintang(4)">★</button>
      <button class="star-btn" onclick="setBintang(5)">★</button>
    </div>
  </div>

  <button class="btn" id="saveBtn" onclick="saveTesti()">Simpan Testimoni →</button>
  <div class="msg success" id="saveOk">✓ Testimoni berhasil ditambahkan!</div>
  <div class="msg error" id="saveErr">Gagal menyimpan. Cek koneksi dan coba lagi.</div>

  <hr class="divider">
  <h2 style="font-size:1rem; margin-bottom:1rem;">// daftar testimoni</h2>
  <div class="testi-list" id="adminList"><p style="font-size:13px;color:var(--muted);">Memuat...</p></div>

  <a href="index.html" class="back-link">← Kembali ke website</a>
</div>

<script>
  var SUPABASE_URL = 'https://hbvqagriewjrfkgulqtg.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhidnFhZ3JpZXdqcmZrZ3VscXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjM3NDksImV4cCI6MjA5NTMzOTc0OX0.GzY2jmmZRKIqV4l9CpPxKXMlcFqyJh7-ZM3KozwF-AE';

  // ============================================================
  // GANTI PASSWORD DI BAWAH INI
  // ============================================================
  var ADMIN_PASS = '@AyamKrispi28';

  var bintang = 5;
  setBintang(5);

  function setBintang(n) {
    bintang = n;
    var btns = document.querySelectorAll('.star-btn');
    btns.forEach(function(b, i) {
      b.classList.toggle('active', i < n);
    });
  }

  function doLogin() {
    var val = document.getElementById('passInput').value;
    if (val === ADMIN_PASS) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminSection').style.display = 'block';
      loadAdminList();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function saveTesti() {
    var nama = document.getElementById('aNama').value.trim();
    var ig = document.getElementById('aIg').value.trim().replace('@','');
    var teks = document.getElementById('aTeks').value.trim();
    if (!nama || !teks) { alert('Nama dan isi testimoni wajib diisi.'); return; }

    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Menyimpan...';
    document.getElementById('saveOk').style.display = 'none';
    document.getElementById('saveErr').style.display = 'none';

    fetch(SUPABASE_URL + '/rest/v1/testimoni', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ nama: nama, username_ig: ig || null, teks: teks, bintang: bintang })
    })
    .then(function(r) {
      if (r.ok || r.status === 201) {
        document.getElementById('saveOk').style.display = 'block';
        document.getElementById('aNama').value = '';
        document.getElementById('aIg').value = '';
        document.getElementById('aTeks').value = '';
        setBintang(5);
        loadAdminList();
      } else { throw new Error('failed'); }
    })
    .catch(function() { document.getElementById('saveErr').style.display = 'block'; })
    .finally(function() { btn.disabled = false; btn.textContent = 'Simpan Testimoni →'; });
  }

  function loadAdminList() {
    fetch(SUPABASE_URL + '/rest/v1/testimoni?select=*&order=id.desc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('adminList');
      if (!data || data.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--muted);">Belum ada testimoni.</p>'; return; }
      el.innerHTML = data.map(function(t) {
        var stars = '';
        for (var i=0;i<t.bintang;i++) stars += '★';
        return '<div class="testi-item">'
          + '<div class="testi-item-info">'
          + '<div class="name">' + t.nama + (t.username_ig ? ' <span style="color:var(--muted)">@'+t.username_ig+'</span>' : '') + '</div>'
          + '<div class="stars">' + stars + '</div>'
          + '<div class="teks">' + t.teks + '</div>'
          + '</div>'
          + '<button class="del-btn" onclick="delTesti(' + t.id + ')" title="Hapus">✕</button>'
          + '</div>';
      }).join('');
    });
  }

  function delTesti(id) {
    if (!confirm('Hapus testimoni ini?')) return;
    fetch(SUPABASE_URL + '/rest/v1/testimoni?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    })
    .then(function() { loadAdminList(); });
  }
</script>
</body>
</html>
